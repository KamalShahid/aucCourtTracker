<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AUC | Law — Court Cause List</title>
<style>
/* Apple system font stack */
:root {
  --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
  --font-mono: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
  --ink: #0f1117;
  --ink2: #2a2d3a;
  --ink3: #5a5f72;
  --ink4: #9099b0;
  --paper: #f7f5f0;
  --paper2: #eeebe4;
  --paper3: #e4e0d8;
  --gold: #b8963e;
  --gold2: #d4af5a;
  --emerald: #1a5c3a;
  --emerald2: #2d8a5a;
  --emerald3: #e8f5ee;
  --crimson: #8b1a1a;
  --crimson2: #c0392b;
  --crimson3: #fdf0f0;
  --sapphire: #1a3a6b;
  --amber2: #d4820f;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(15,17,23,0.08);
  --shadow-lg: 0 8px 32px rgba(15,17,23,0.14);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: var(--font); background: var(--paper); color: var(--ink); min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased; }

/* Header */
.app-header { background: var(--ink); padding: 0 16px; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-lg); }
.header-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: center; gap: 12px; height: 56px; }
.brand { display: flex; align-items: center; gap: 10px; flex: 1; }
.brand-seal { width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid var(--gold); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--gold); flex-shrink: 0; letter-spacing: 0.3px; }
.brand-name { font-size: 17px; font-weight: 600; color: var(--paper); letter-spacing: -0.3px; }
.brand-sub { font-size: 10px; color: var(--gold2); letter-spacing: 1px; text-transform: uppercase; font-weight: 500; }
.header-date-btn { display: flex; align-items: center; gap: 6px; background: rgba(184,150,62,0.15); border: 1px solid rgba(184,150,62,0.3); border-radius: 8px; padding: 6px 12px; cursor: pointer; color: var(--gold2); font-size: 12px; font-weight: 500; font-family: var(--font); }
.header-date-btn svg { width:14px; height:14px; }
.add-btn { width: 34px; height: 34px; border-radius: 50%; background: var(--gold); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
.add-btn:hover { background: var(--gold2); transform: scale(1.05); }
.add-btn svg { width:16px; height:16px; }

/* Calendar Strip */
.cal-strip { background: var(--ink2); padding: 10px 16px; overflow-x: auto; scrollbar-width: none; position: sticky; top: 56px; z-index: 99; }
.cal-strip::-webkit-scrollbar { display: none; }
.cal-inner { display: flex; gap: 6px; max-width: 900px; margin: 0 auto; align-items: center; }
.cal-day { display: flex; flex-direction: column; align-items: center; padding: 6px 10px; border-radius: 10px; cursor: pointer; transition: all 0.2s; min-width: 46px; border: 1px solid transparent; flex-shrink: 0; }
.cal-day:hover { background: rgba(255,255,255,0.08); }
.cal-day.active { background: var(--gold); border-color: var(--gold2); }
.cal-day.has-cases { border-color: rgba(184,150,62,0.4); }
.cal-day .day-name { font-size: 10px; color: var(--ink4); font-weight: 500; text-transform: uppercase; letter-spacing: 0.3px; }
.cal-day.active .day-name { color: var(--ink); }
.cal-day .day-num { font-size: 17px; font-weight: 600; color: var(--paper); margin-top: 1px; letter-spacing: -0.5px; }
.cal-day.active .day-num { color: var(--ink); }
.cal-day .day-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold2); margin-top: 3px; }
.cal-day.active .day-dot { background: var(--ink); }
.cal-expand-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 8px 10px; cursor: pointer; color: var(--paper); font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 3px; flex-shrink: 0; }
.cal-expand-btn svg { width:14px; height:14px; }

/* Stats Bar */
.stats-bar { background: white; border-bottom: 1px solid var(--paper3); padding: 8px 16px; position: sticky; top: 100px; z-index: 90; }
.stats-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: center; gap: 16px; overflow-x: auto; scrollbar-width: none; }
.stats-inner::-webkit-scrollbar { display: none; }
.stat-pill { display: flex; align-items: center; gap: 6px; white-space: nowrap; font-size: 12px; font-weight: 500; color: var(--ink3); flex-shrink: 0; }
.stat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.stat-num { font-weight: 700; color: var(--ink); }

/* Date Heading */
.date-section { max-width: 900px; margin: 0 auto; padding: 0 16px; }
.date-heading { display: flex; align-items: center; gap: 12px; padding: 20px 0 12px; }
.date-heading-line { flex: 1; height: 1px; background: var(--paper3); }
.date-heading-text { font-size: 20px; font-weight: 700; color: var(--ink2); white-space: nowrap; letter-spacing: -0.3px; }
.date-badge { background: var(--ink); color: var(--gold2); font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 99px; }
.no-cases { text-align: center; padding: 48px 16px; color: var(--ink4); }
.no-cases svg { width: 48px; height: 48px; opacity: 0.3; margin-bottom: 12px; display: block; margin-left: auto; margin-right: auto; }
.no-cases p { font-size: 14px; }

/* Case Card */
.case-card { background: white; border-radius: var(--radius); border: 1px solid var(--paper3); margin-bottom: 10px; overflow: hidden; transition: border-color 0.3s; box-shadow: var(--shadow); animation: slideIn 0.25s ease; }
.case-card.next-set { border-color: var(--gold); border-width: 1.5px; }
@keyframes slideIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

/* Case Title — centered, large, bold */
.case-title-wrap { padding: 14px 16px 10px; text-align: center; border-bottom: 1px solid var(--paper2); background: white; }
.case-title { font-size: 20px; font-weight: 700; color: var(--ink); line-height: 1.3; letter-spacing: -0.4px; }

/* Case Body */
.case-body { padding: 12px 14px; }
.meta-item { display: flex; flex-direction: column; gap: 3px; margin-bottom: 10px; }
.meta-label { font-size: 10px; color: var(--ink4); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; }
.meta-value { font-size: 13px; color: var(--ink2); font-weight: 500; line-height: 1.4; }
.meta-value.judge { color: var(--sapphire); font-weight: 600; }
.meta-value.proceedings { font-size: 13px; color: var(--ink3); font-weight: 400; font-style: normal; }

/* Actions row — Sr# input + Judge Y/N in one row */
.case-actions { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-top: 1px solid var(--paper2); flex-wrap: wrap; background: var(--paper); }
.sr-field { display: flex; align-items: center; gap: 8px; }
.sr-input-label { font-size: 11px; color: var(--ink4); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
.sr-input { width: 64px; border: 1.5px solid var(--paper3); border-radius: 8px; padding: 6px 8px; font-size: 14px; font-family: var(--font-mono); color: var(--ink); background: white; text-align: center; font-weight: 600; transition: border-color 0.15s; }
.sr-input:focus { outline: none; border-color: var(--gold); }
.judge-status-wrap { display: flex; align-items: center; gap: 6px; margin-left: auto; }
.judge-label { font-size: 11px; color: var(--ink4); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.yn-btn { padding: 6px 14px; border-radius: 8px; border: 1.5px solid var(--paper3); background: white; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.15s; font-family: var(--font); letter-spacing: 0.3px; }
.yn-btn.yes { border-color: var(--emerald2); color: var(--emerald); }
.yn-btn.yes.active { background: var(--emerald); color: white; border-color: var(--emerald); }
.yn-btn.no { border-color: var(--crimson2); color: var(--crimson); }
.yn-btn.no.active { background: var(--crimson2); color: white; border-color: var(--crimson2); }
.status-chip { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 99px; }
.status-chip.present { background: var(--emerald3); color: var(--emerald); }
.status-chip.absent { background: var(--crimson3); color: var(--crimson2); }
.status-chip.unknown { background: var(--paper2); color: var(--ink4); }
.status-chip::before { content:''; width:5px; height:5px; border-radius:50%; background:currentColor; }

/* Dates row — Last + Next side by side */
.dates-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border-top: 1px solid var(--paper2); }
.date-field { display: flex; flex-direction: column; gap: 4px; padding: 10px 14px; }
.date-field:first-child { border-right: 1px solid var(--paper2); }
.date-field-label { font-size: 10px; color: var(--ink4); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; }
.last-date-val { font-size: 14px; font-weight: 600; color: var(--ink3); font-family: var(--font-mono); letter-spacing: 0.3px; }
.last-date-val.empty { font-size: 13px; color: var(--ink4); font-family: var(--font); font-weight: 400; }
.next-date-picker { border: 1.5px solid var(--paper3); border-radius: 8px; padding: 6px 8px; font-size: 13px; font-family: var(--font); color: var(--ink2); background: white; width: 100%; cursor: pointer; transition: border-color 0.15s; font-weight: 500; }
.next-date-picker:focus { outline: none; border-color: var(--gold); }
.next-date-picker.set { border-color: var(--gold); background: #fef9ec; color: var(--gold); font-weight: 700; font-family: var(--font-mono); font-size: 13px; letter-spacing: 0.3px; }

/* Advance row — only shows when next date is set */
.advance-row { display: flex; align-items: center; justify-content: flex-end; padding: 10px 14px; border-top: 1px solid var(--paper2); background: #fef9ec; gap: 10px; }
.advance-note { font-size: 12px; color: var(--gold); font-weight: 500; flex: 1; }
.advance-btn { display: flex; align-items: center; gap: 6px; padding: 8px 18px; border-radius: 8px; border: none; background: var(--gold); color: white; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.15s; font-family: var(--font); letter-spacing: -0.2px; }
.advance-btn:hover { background: var(--gold2); transform: scale(1.02); }
.advance-btn:active { transform: scale(0.98); }
.advance-btn svg { width:14px; height:14px; }

/* Edit button */
.edit-btn { width: 28px; height: 28px; border-radius: 6px; border: none; background: var(--paper2); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--ink3); flex-shrink: 0; }
.edit-btn svg { width: 13px; height: 13px; }

/* Card top bar — just edit btn, no Sr badge */
.card-topbar { display: flex; align-items: center; justify-content: flex-end; padding: 8px 12px 0; }

/* Modals / Sheet */
.overlay { position: fixed; inset: 0; background: rgba(15,17,23,0.7); z-index: 200; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
.overlay.open { opacity: 1; pointer-events: all; }
.sheet { background: white; border-radius: 20px 20px 0 0; width: 100%; max-width: 600px; padding: 0 0 env(safe-area-inset-bottom,16px); transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.34,1.1,0.64,1); max-height: 90vh; overflow-y: auto; }
.overlay.open .sheet { transform: translateY(0); }
.sheet-handle { width: 40px; height: 4px; background: var(--paper3); border-radius: 2px; margin: 12px auto 0; }
.sheet-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--paper2); display: flex; align-items: center; justify-content: space-between; }
.sheet-title { font-size: 18px; font-weight: 700; color: var(--ink); letter-spacing: -0.3px; }
.sheet-close { width: 30px; height: 30px; border-radius: 50%; background: var(--paper2); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--ink3); }
.sheet-close svg { width: 16px; height: 16px; }
.sheet-body { padding: 16px 20px; }
.form-field { margin-bottom: 14px; }
.form-label { display: block; font-size: 11px; font-weight: 600; color: var(--ink4); text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 5px; }
.form-input, .form-textarea { width: 100%; border: 1.5px solid var(--paper3); border-radius: 10px; padding: 11px 13px; font-size: 15px; font-family: var(--font); color: var(--ink); background: var(--paper); appearance: none; transition: border-color 0.15s; font-weight: 400; }
.form-input:focus, .form-textarea:focus { outline: none; border-color: var(--gold); background: white; }
.form-textarea { resize: vertical; min-height: 72px; }
.btn-primary { width: 100%; padding: 14px; background: var(--ink); color: var(--gold2); border: none; border-radius: 12px; font-size: 15px; font-weight: 700; font-family: var(--font); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 8px; letter-spacing: -0.2px; }
.btn-primary svg { width: 16px; height: 16px; }

/* Full Calendar Modal */
.cal-modal-overlay { position: fixed; inset: 0; background: rgba(15,17,23,0.8); z-index: 300; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; padding: 20px; }
.cal-modal-overlay.open { opacity: 1; pointer-events: all; }
.cal-modal { background: white; border-radius: 20px; padding: 24px; width: 100%; max-width: 380px; transform: scale(0.92); transition: transform 0.25s cubic-bezier(0.34,1.1,0.64,1); }
.cal-modal-overlay.open .cal-modal { transform: scale(1); }
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.cal-nav-btn { width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--paper3); background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--ink3); }
.cal-nav-btn svg { width: 16px; height: 16px; }
.cal-month-label { font-size: 18px; font-weight: 700; color: var(--ink); letter-spacing: -0.3px; }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
.cal-grid-header { font-size: 10px; font-weight: 700; color: var(--ink4); text-align: center; padding: 4px 0; text-transform: uppercase; }
.cal-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--ink2); position: relative; }
.cal-cell:hover { background: var(--paper2); }
.cal-cell.today { font-weight: 800; color: var(--gold); }
.cal-cell.selected { background: var(--ink); color: var(--gold2); }
.cal-cell.other-month { color: var(--ink4); opacity: 0.4; }
.cal-cell.has-cases::after { content:''; position:absolute; bottom:3px; width:4px; height:4px; border-radius:50%; background:var(--gold); }
.cal-cell.selected::after { background: var(--gold2); }

/* Toast */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--ink); color: white; padding: 10px 20px; border-radius: 99px; font-size: 13px; font-weight: 600; z-index: 999; transition: transform 0.3s cubic-bezier(0.34,1.1,0.64,1); white-space: nowrap; box-shadow: var(--shadow-lg); font-family: var(--font); }
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { background: var(--emerald); }
.toast.warning { background: var(--amber2); }

.main-content { padding-bottom: 80px; }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <div class="brand">
      <div class="brand-seal">AUC</div>
      <div>
        <div class="brand-name">AUC | Law</div>
        <div class="brand-sub">Court Cause List</div>
      </div>
    </div>
    <button class="header-date-btn" onclick="openCalModal()">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <span id="header-date-label">Today</span>
    </button>
    <button class="add-btn" onclick="openAddSheet()">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" color="var(--ink)"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </div>
</header>

<div class="cal-strip">
  <div class="cal-inner" id="cal-strip-inner"></div>
</div>

<div class="stats-bar">
  <div class="stats-inner" id="stats-bar"></div>
</div>

<div class="main-content">
  <div class="date-section" id="main-cases"></div>
</div>

<!-- Add/Edit Sheet -->
<div class="overlay" id="add-overlay" onclick="handleOverlayClick(event,'add-overlay')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title" id="sheet-title">Add New Case</div>
      <button class="sheet-close" onclick="closeSheet('add-overlay')">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="sheet-body">
      <input type="hidden" id="edit-id">
      <div class="form-field">
        <label class="form-label">Hearing Date *</label>
        <input type="date" class="form-input" id="f-date">
      </div>
      <div class="form-field">
        <label class="form-label">Case Title *</label>
        <input type="text" class="form-input" id="f-title" placeholder="e.g. Ahmad v. Federation of Pakistan">
      </div>
      <div class="form-field">
        <label class="form-label">Judge Name *</label>
        <input type="text" class="form-input" id="f-judge" placeholder="e.g. Hon'ble Mr. Justice Sardar Tariq Masood">
      </div>
      <div class="form-field">
        <label class="form-label">Proceedings / Stage</label>
        <textarea class="form-textarea" id="f-proceedings" placeholder="e.g. Arguments on maintainability, Stay application pending"></textarea>
      </div>
      <button class="btn-primary" onclick="saveCase()">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M5 13l4 4L19 7"/></svg>
        Save Case
      </button>
    </div>
  </div>
</div>

<!-- Full Calendar -->
<div class="cal-modal-overlay" id="cal-modal-overlay" onclick="handleOverlayClick(event,'cal-modal-overlay')">
  <div class="cal-modal">
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="calNav(-1)">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="cal-month-label" id="cal-month-label"></div>
      <button class="cal-nav-btn" onclick="calNav(1)">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <button onclick="closeCalModal()" style="width:100%;margin-top:16px;padding:11px;border:1px solid var(--paper3);border-radius:10px;background:white;font-size:14px;cursor:pointer;font-family:var(--font);color:var(--ink3);font-weight:500">Close</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js';
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js';

/* ─────────────────────────────────────────────────────────────
   FIREBASE CONFIG — paste the config from your Firebase project:
     Firebase Console → Project Settings → General →
     Your apps → Web app → "SDK setup and configuration" → Config
   Replace every PASTE_… value below, then redeploy.
   ───────────────────────────────────────────────────────────── */
const firebaseConfig = {
  apiKey: "AIzaSyAckd8M6zw5fadpe9OZBfEop-X4vzA-km8",
  authDomain: "auc-court-tracker.firebaseapp.com",
  projectId: "auc-court-tracker",
  storageBucket: "auc-court-tracker.firebasestorage.app",
  messagingSenderId: "706635940238",
  appId: "1:706635940238:web:6d34a31d044661419b64df",
  measurementId: "G-NW93YG975R"
};
/* ───────────────────────────────────────────────────────────── */

const isConfigured = firebaseConfig.apiKey && !firebaseConfig.apiKey.startsWith('PASTE_');

if (!isConfigured) {
  window.addEventListener('DOMContentLoaded', () => {
    const banner = document.createElement('div');
    banner.style.cssText = 'background:#fef3c7;color:#92400e;padding:10px 16px;font:13px/1.5 -apple-system,BlinkMacSystemFont,sans-serif;text-align:center;border-bottom:1px solid #fcd34d';
    banner.innerHTML = '<strong>Firebase not configured.</strong> Cases are saved only on this device until you paste the Firebase config in <code>index.html</code> and redeploy.';
    document.body.insertBefore(banner, document.body.firstChild);
  });
} else {
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const casesCol = collection(db, 'cases');

  onSnapshot(
    casesCol,
    snap => {
      const data = snap.docs.map(d => d.data());
      window.onCasesUpdate?.(data);
    },
    err => {
      console.error('Firestore listen error:', err);
      window.showToast?.('Sync error — check Firestore rules', 'warning');
    }
  );

  window.fbSave = (c) => setDoc(doc(casesCol, c.id), c).catch(e => {
    console.error('Firestore save failed:', e);
    window.showToast?.('Save failed — check connection', 'warning');
  });
  window.fbDelete = (id) => deleteDoc(doc(casesCol, id)).catch(e => {
    console.error('Firestore delete failed:', e);
  });
}
</script>

<script>
const DB_KEY = 'auc_court_cases_v5';
let cases = [], selectedDate = todayStr(), calViewDate = new Date(), editingId = null;

function todayStr() { return new Date().toISOString().split('T')[0]; }

// DD-MM-YYYY display format
function fmtDMY(d) {
  if(!d) return '';
  const [y,m,day] = d.split('-');
  return `${day}-${m}-${y}`;
}
function fmtLong(d) {
  if(!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-PK', { weekday:'short', day:'2-digit', month:'long', year:'numeric' });
}
function fmtShort(d) {
  if(!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-PK', { day:'2-digit', month:'short' });
}

function load() {
  try { const r = localStorage.getItem(DB_KEY); if(r) cases = JSON.parse(r); } catch(e) { cases = []; }
}
function saveCache() { try { localStorage.setItem(DB_KEY, JSON.stringify(cases)); } catch(e) {} }
function persist(c) {
  saveCache();
  if (c) window.fbSave?.(c);
}

// Firestore snapshot listener calls this whenever the shared collection changes.
window.onCasesUpdate = (data) => {
  cases = data;
  saveCache();
  render();
};

function render() { renderCalStrip(); renderStats(); renderCases(); updateHeaderDate(); }

function updateHeaderDate() {
  document.getElementById('header-date-label').textContent =
    selectedDate === todayStr() ? 'Today' : fmtShort(selectedDate);
}

function renderCalStrip() {
  const container = document.getElementById('cal-strip-inner');
  const today = new Date();
  container.innerHTML = '';

  // Full calendar button
  const eb = document.createElement('button');
  eb.className = 'cal-expand-btn';
  eb.innerHTML = `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><span style="font-size:9px;color:var(--ink4)">Full</span>`;
  eb.onclick = openCalModal;
  container.appendChild(eb);

  for(let i = -3; i <= 14; i++) {
    const d = new Date(today); d.setDate(today.getDate() + i);
    const ds = d.toISOString().split('T')[0];
    const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const hasCases = cases.some(c => c.date === ds || c.nextDate === ds);
    const isActive = ds === selectedDate;
    const isToday = ds === todayStr();
    const div = document.createElement('div');
    div.className = 'cal-day' + (isActive?' active':'') + (hasCases?' has-cases':'');
    div.innerHTML = `<span class="day-name">${dayNames[d.getDay()]}</span><span class="day-num" style="${isToday&&!isActive?'color:var(--gold2)':''}">${d.getDate()}</span>${hasCases?'<span class="day-dot"></span>':''}`;
    div.onclick = () => { selectedDate = ds; render(); window.scrollTo({top:0,behavior:'smooth'}); };
    container.appendChild(div);
  }
  setTimeout(() => {
    const a = container.querySelector('.active');
    if(a) a.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  }, 50);
}

function renderStats() {
  const dc = cases.filter(c => c.date === selectedDate);
  const total = dc.length;
  const present = dc.filter(c=>c.judgeStatus==='Y').length;
  const absent = dc.filter(c=>c.judgeStatus==='N').length;
  const withNext = dc.filter(c=>c.nextDate).length;
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-pill"><div class="stat-dot" style="background:var(--ink2)"></div><span class="stat-num">${total}</span> Cases</div>
    <div class="stat-pill"><div class="stat-dot" style="background:var(--emerald)"></div><span class="stat-num">${present}</span> Judge Present</div>
    <div class="stat-pill"><div class="stat-dot" style="background:var(--crimson2)"></div><span class="stat-num">${absent}</span> Absent</div>
    <div class="stat-pill"><div class="stat-dot" style="background:var(--gold)"></div><span class="stat-num">${withNext}</span> Next Date Set</div>`;
}

function renderCases() {
  const container = document.getElementById('main-cases');
  // Show cases whose .date === selectedDate — nextDate selection does NOT move them here
  const dc = cases.filter(c => c.date === selectedDate).sort((a,b)=>(a.srNo||9999)-(b.srNo||9999));

  if(!dc.length) {
    container.innerHTML = `
      <div class="date-heading">
        <div class="date-heading-line"></div>
        <div class="date-heading-text">${fmtDMY(selectedDate)}</div>
        <div class="date-heading-line"></div>
      </div>
      <div class="no-cases">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        <p>No cases scheduled for this date.</p>
        <p style="margin-top:6px;font-size:12px">Tap + to add a case.</p>
      </div>`;
    return;
  }

  let html = `<div class="date-heading">
    <div class="date-heading-line"></div>
    <div class="date-heading-text">${fmtDMY(selectedDate)}</div>
    <span class="date-badge">${dc.length} case${dc.length>1?'s':''}</span>
    <div class="date-heading-line"></div>
  </div>`;

  dc.forEach(c => {
    const judgeChip = c.judgeStatus==='Y'
      ? `<span class="status-chip present">Present</span>`
      : c.judgeStatus==='N'
      ? `<span class="status-chip absent">Absent</span>`
      : `<span class="status-chip unknown">Unknown</span>`;

    // Last date: empty dash on first entry, populated after Advance
    const lastDateHtml = c.lastDate
      ? `<span class="last-date-val">${fmtDMY(c.lastDate)}</span>`
      : `<span class="last-date-val empty">—</span>`;

    // Card border highlights gold when next date is set (but case stays here until Advance)
    const cardClass = c.nextDate ? 'case-card next-set' : 'case-card';

    html += `<div class="${cardClass}" id="card-${c.id}">

      <div class="card-topbar">
        <button class="edit-btn" onclick="editCase('${c.id}')" title="Edit case">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
        </button>
      </div>

      <div class="case-title-wrap">
        <div class="case-title">${c.title}</div>
      </div>

      <div class="case-body">
        <div class="meta-item">
          <span class="meta-label">Judge</span>
          <span class="meta-value judge">${c.judge}</span>
        </div>
        <div class="meta-item" style="margin-bottom:0">
          <span class="meta-label">Proceedings</span>
          <span class="meta-value proceedings">${c.proceedings || '—'}</span>
        </div>
      </div>

      <div class="case-actions">
        <div class="sr-field">
          <span class="sr-input-label">Sr #</span>
          <input type="number" class="sr-input" value="${c.srNo||''}" placeholder="—"
            onchange="updateSr('${c.id}', this.value)" min="1" max="999">
        </div>
        <div class="judge-status-wrap">
          <span class="judge-label">Judge</span>
          <button class="yn-btn yes ${c.judgeStatus==='Y'?'active':''}" onclick="setJudgeStatus('${c.id}','Y')">Y</button>
          <button class="yn-btn no ${c.judgeStatus==='N'?'active':''}" onclick="setJudgeStatus('${c.id}','N')">N</button>
          ${judgeChip}
        </div>
      </div>

      <div class="dates-row">
        <div class="date-field">
          <span class="date-field-label">Last Date</span>
          ${lastDateHtml}
        </div>
        <div class="date-field">
          <span class="date-field-label">Next Date</span>
          <input type="date" class="next-date-picker ${c.nextDate?'set':''}"
            value="${c.nextDate||''}"
            onchange="setNextDate('${c.id}', this.value)"
            id="nd-${c.id}">
        </div>
      </div>

      ${c.nextDate ? `
      <div class="advance-row">
        <span class="advance-note">Next hearing: ${fmtDMY(c.nextDate)} — press Advance when ready</span>
        <button class="advance-btn" onclick="advanceCase('${c.id}')">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg>
          Advance
        </button>
      </div>` : ''}

    </div>`;
  });

  container.innerHTML = html;
}

/* ── Actions ── */
function updateSr(id, val) {
  const c = cases.find(x=>x.id===id); if(!c) return;
  c.srNo = parseInt(val)||null; persist(c);
  showToast('Sr # updated','success');
}

function setJudgeStatus(id, status) {
  const c = cases.find(x=>x.id===id); if(!c) return;
  c.judgeStatus = c.judgeStatus===status ? null : status;
  persist(c); render();
  showToast(c.judgeStatus==='Y'?'Judge marked present':c.judgeStatus==='N'?'Judge marked absent':'Status cleared','success');
}

function setNextDate(id, val) {
  const c = cases.find(x=>x.id===id); if(!c) return;
  c.nextDate = val||null;
  // Case STAYS on current date — only Advance button moves it
  persist(c); render();
  if(val) showToast('Next date noted: '+fmtDMY(val),'success');
}

function advanceCase(id) {
  const c = cases.find(x=>x.id===id);
  if(!c||!c.nextDate) { showToast('Set next date first','warning'); return; }
  const newDate = c.nextDate;
  c.lastDate = c.date;      // current hearing date saved as last date
  c.date = newDate;          // case now moves to next date
  c.nextDate = null;
  c.judgeStatus = null;
  c.srNo = null;
  c.done = false;
  persist(c);
  selectedDate = newDate;
  render();
  showToast('Case advanced to '+fmtDMY(newDate),'success');
}

/* ── Add / Edit ── */
function openAddSheet() {
  editingId = null;
  document.getElementById('sheet-title').textContent = 'Add New Case';
  document.getElementById('edit-id').value = '';
  document.getElementById('f-date').value = selectedDate;
  document.getElementById('f-title').value = '';
  document.getElementById('f-judge').value = '';
  document.getElementById('f-proceedings').value = '';
  document.getElementById('add-overlay').classList.add('open');
}

function editCase(id) {
  const c = cases.find(x=>x.id===id); if(!c) return;
  editingId = id;
  document.getElementById('sheet-title').textContent = 'Edit Case';
  document.getElementById('edit-id').value = id;
  document.getElementById('f-date').value = c.date;
  document.getElementById('f-title').value = c.title;
  document.getElementById('f-judge').value = c.judge;
  document.getElementById('f-proceedings').value = c.proceedings||'';
  document.getElementById('add-overlay').classList.add('open');
}

function saveCase() {
  const date = document.getElementById('f-date').value;
  const title = document.getElementById('f-title').value.trim();
  const judge = document.getElementById('f-judge').value.trim();
  if(!date||!title||!judge) { showToast('Date, Title and Judge are required','warning'); return; }
  let saved;
  if(editingId) {
    saved = cases.find(x=>x.id===editingId);
    if(saved) { saved.date=date; saved.title=title; saved.judge=judge; saved.proceedings=document.getElementById('f-proceedings').value.trim(); }
  } else {
    const newId = (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : (Date.now().toString()+Math.random().toString(36).slice(2,8));
    saved = { id:newId, date, title, judge,
      proceedings: document.getElementById('f-proceedings').value.trim(),
      srNo:null, judgeStatus:null, nextDate:null, lastDate:null, done:false,
      created:new Date().toISOString() };
    cases.push(saved);
  }
  if(saved) persist(saved);
  selectedDate=date; closeSheet('add-overlay'); render();
  showToast(editingId?'Case updated':'Case added successfully','success');
}

/* ── Calendar ── */
function openCalModal() {
  calViewDate = new Date(selectedDate+'T00:00:00');
  renderCalGrid();
  document.getElementById('cal-modal-overlay').classList.add('open');
}
function closeCalModal() { document.getElementById('cal-modal-overlay').classList.remove('open'); }
function calNav(dir) { calViewDate.setMonth(calViewDate.getMonth()+dir); renderCalGrid(); }
function renderCalGrid() {
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-month-label').textContent = months[calViewDate.getMonth()]+' '+calViewDate.getFullYear();
  const grid=document.getElementById('cal-grid');
  const days=['Su','Mo','Tu','We','Th','Fr','Sa'];
  let html=days.map(d=>`<div class="cal-grid-header">${d}</div>`).join('');
  const first=new Date(calViewDate.getFullYear(),calViewDate.getMonth(),1);
  const last=new Date(calViewDate.getFullYear(),calViewDate.getMonth()+1,0);
  const allDates=[...new Set(cases.flatMap(c=>[c.date,c.nextDate].filter(Boolean)))];
  const today=todayStr();
  for(let i=0;i<first.getDay();i++){
    const d=new Date(first); d.setDate(d.getDate()-(first.getDay()-i));
    const ds=d.toISOString().split('T')[0];
    html+=`<div class="cal-cell other-month ${allDates.includes(ds)?'has-cases':''} ${ds===selectedDate?'selected':''}" onclick="pickCalDate('${ds}')">${d.getDate()}</div>`;
  }
  for(let i=1;i<=last.getDate();i++){
    const d=new Date(calViewDate.getFullYear(),calViewDate.getMonth(),i);
    const ds=d.toISOString().split('T')[0];
    html+=`<div class="cal-cell ${ds===today?'today':''} ${allDates.includes(ds)?'has-cases':''} ${ds===selectedDate?'selected':''}" onclick="pickCalDate('${ds}')">${i}</div>`;
  }
  grid.innerHTML=html;
}
function pickCalDate(ds) { selectedDate=ds; closeCalModal(); render(); }

/* ── Utils ── */
function closeSheet(id) { document.getElementById(id).classList.remove('open'); }
function handleOverlayClick(e,id) { if(e.target.id===id) closeSheet(id); }
let toastTimer;
function showToast(msg,type='') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+type; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}

// Bootstrap: render cached data instantly; Firestore snapshot will
// then replace it with the authoritative shared copy when it arrives.
load(); render();
</script>
</body>
</html>
