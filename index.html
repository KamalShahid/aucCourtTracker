<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Wakala — ہر پیشی · ہر کام · ایک جگہ</title>
<style>
:root {
  --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
  --font-mono: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
  --ink: #0f1117; --ink2: #2a2d3a; --ink3: #5a5f72; --ink4: #9099b0;
  --paper: #f7f5f0; --paper2: #eeebe4; --paper3: #e4e0d8;
  --gold: #b8963e; --gold2: #d4af5a;
  --emerald: #1a5c3a; --emerald2: #2d8a5a; --emerald3: #e8f5ee;
  --crimson: #8b1a1a; --crimson2: #c0392b; --crimson3: #fdf0f0;
  --sapphire: #1a3a6b; --sapphire2: #2563a8; --sapphire3: #eef4fc;
  --violet: #5b21b6; --violet2: #7c3aed; --violet3: #f5f3ff;
  --amber: #92580a; --amber2: #d4820f; --amber3: #fef3e2;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(15,17,23,0.08);
  --shadow-lg: 0 8px 32px rgba(15,17,23,0.14);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: var(--font); background: var(--paper); color: var(--ink); min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased; }

/* Sync */
.sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ink4); display: inline-block; transition: background 0.3s; }
.sync-dot.live { background: var(--emerald2); animation: pulse-dot 2s infinite; }
.sync-dot.error { background: var(--crimson2); }
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }
.sync-label { font-size: 10px; color: var(--ink4); }
.sync-label.live { color: var(--emerald2); }
.sync-wrap { display: flex; align-items: center; gap: 5px; }

/* Header */
.app-header { background: var(--ink); padding: 0 16px; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-lg); }
.header-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: center; gap: 10px; height: 56px; }
.brand { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
.brand-seal { width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid var(--gold); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: var(--gold); flex-shrink: 0; letter-spacing: 0; }
.brand-name { font-size: 17px; font-weight: 600; color: var(--paper); letter-spacing: -0.3px; }
.brand-sub { font-size: 11px; color: var(--gold2); letter-spacing: 0; font-weight: 500; line-height: 1.3; white-space: nowrap; }
.brand-text { min-width: 0; overflow: hidden; }
.brand-text .brand-sub { overflow: hidden; text-overflow: ellipsis; max-width: 260px; }
.header-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.hdr-icon-btn { position: relative; width: 36px; height: 36px; border-radius: 10px; border: none; background: rgba(255,255,255,0.07); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--ink4); transition: all 0.15s; flex-shrink: 0; }
.hdr-icon-btn:hover { background: rgba(255,255,255,0.14); color: var(--paper); }
.hdr-icon-btn.active { background: rgba(184,150,62,0.2); color: var(--gold2); }
.hdr-icon-btn svg { width: 17px; height: 17px; }
.hdr-badge { position: absolute; top: -3px; right: -3px; background: var(--amber2); color: white; font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 99px; min-width: 16px; text-align: center; }
.hdr-divider { width: 1px; height: 22px; background: rgba(255,255,255,0.1); flex-shrink: 0; }
.header-date-btn { display: flex; align-items: center; gap: 6px; background: rgba(184,150,62,0.15); border: 1px solid rgba(184,150,62,0.3); border-radius: 8px; padding: 6px 10px; cursor: pointer; color: var(--gold2); font-size: 12px; font-weight: 500; font-family: var(--font); white-space: nowrap; }
.header-date-btn svg { width: 13px; height: 13px; }
.add-btn { width: 34px; height: 34px; border-radius: 50%; background: var(--gold); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
.add-btn:hover { background: var(--gold2); transform: scale(1.05); }
.add-btn svg { width: 16px; height: 16px; }

/* Calendar Strip */
.cal-strip { background: var(--ink2); padding: 10px 16px; overflow-x: auto; scrollbar-width: none; position: sticky; top: 56px; z-index: 99; }
.cal-strip::-webkit-scrollbar { display: none; }
.cal-inner { display: flex; gap: 6px; max-width: 900px; margin: 0 auto; align-items: center; }
.cal-day { display: flex; flex-direction: column; align-items: center; padding: 6px 10px; border-radius: 10px; cursor: pointer; transition: all 0.2s; min-width: 46px; border: 1px solid transparent; flex-shrink: 0; }
.cal-day:hover { background: rgba(255,255,255,0.08); }
.cal-day.active { background: var(--gold); border-color: var(--gold2); }
.cal-day.has-cases { border-color: rgba(184,150,62,0.4); }
.cal-day .day-name { font-size: 10px; color: var(--ink4); font-weight: 500; text-transform: uppercase; }
.cal-day.active .day-name { color: var(--ink); }
.cal-day .day-num { font-size: 17px; font-weight: 600; color: var(--paper); margin-top: 1px; }
.cal-day.active .day-num { color: var(--ink); }
.cal-day .day-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold2); margin-top: 3px; }
.cal-day.active .day-dot { background: var(--ink); }
.cal-expand-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 8px 10px; cursor: pointer; color: var(--paper); font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 3px; flex-shrink: 0; }
.cal-expand-btn svg { width: 14px; height: 14px; }

/* Search Bar */
.search-bar { background: white; border-bottom: 1px solid var(--paper3); padding: 8px 16px; position: sticky; top: 100px; z-index: 92; }
.search-bar-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: center; gap: 8px; position: relative; }
.search-input-wrap { position: relative; flex: 1; }
.search-input-icon { position: absolute; top: 50%; left: 11px; transform: translateY(-50%); width: 15px; height: 15px; color: var(--ink4); pointer-events: none; }
.search-input { width: 100%; border: 1.5px solid var(--paper3); border-radius: 8px; padding: 8px 32px 8px 33px; font-size: 13px; font-family: var(--font); color: var(--ink); background: white; }
.search-input:focus { outline: none; border-color: var(--gold); }
.search-input::placeholder { color: var(--ink4); }
.search-clear { position: absolute; top: 50%; right: 6px; transform: translateY(-50%); background: var(--paper2); border: none; cursor: pointer; padding: 4px; color: var(--ink3); border-radius: 50%; width: 22px; height: 22px; display: none; align-items: center; justify-content: center; }
.search-clear.show { display: inline-flex; }
.search-clear:hover { background: var(--paper3); color: var(--ink); }
.search-clear svg { width: 12px; height: 12px; }

/* Stats */
.stats-bar { background: white; border-bottom: 1px solid var(--paper3); padding: 8px 16px; position: sticky; top: 144px; z-index: 90; }
.stats-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: center; gap: 16px; overflow-x: auto; scrollbar-width: none; }
.stats-inner::-webkit-scrollbar { display: none; }
.stat-pill { display: flex; align-items: center; gap: 6px; white-space: nowrap; font-size: 12px; font-weight: 500; color: var(--ink3); flex-shrink: 0; }
.stat-pill.clickable { cursor: pointer; padding: 2px 8px; border-radius: 99px; transition: background 0.15s, color 0.15s; }
.stat-pill.clickable:hover { background: var(--paper2); color: var(--ink); }
.stat-pill.clickable:hover .stat-num { color: var(--gold); }
.stat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.stat-num { font-weight: 700; color: var(--ink); }

/* Date Heading */
.date-section { max-width: 900px; margin: 0 auto; padding: 0 16px; }
.date-heading { display: flex; align-items: center; gap: 12px; padding: 20px 0 12px; }
.date-heading-line { flex: 1; height: 1px; background: var(--paper3); }
.date-heading-text { font-size: 20px; font-weight: 700; color: var(--ink2); white-space: nowrap; letter-spacing: -0.3px; }
.date-badge { background: var(--ink); color: var(--gold2); font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 99px; }
.no-cases { text-align: center; padding: 48px 16px; color: var(--ink4); }
.no-cases svg { width: 48px; height: 48px; opacity: 0.3; margin-bottom: 12px; display: block; margin-left: auto; margin-right: auto; }
.no-cases p { font-size: 14px; }

/* Case Card */
.case-card { background: white; border-radius: var(--radius); border: 1px solid var(--paper3); margin-bottom: 12px; overflow: hidden; transition: border-color 0.3s; box-shadow: var(--shadow); animation: slideIn 0.25s ease; }
.case-card.next-set { border-color: var(--gold); border-width: 1.5px; }
@keyframes slideIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* Card top bar */
.card-topbar { display: flex; align-items: center; justify-content: flex-end; gap: 6px; padding: 8px 12px 0; }
.icon-btn { width: 30px; height: 30px; border-radius: 8px; border: none; background: var(--paper2); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--ink3); flex-shrink: 0; transition: background 0.15s; position: relative; }
.icon-btn:hover { background: var(--paper3); }
.icon-btn svg { width: 14px; height: 14px; }
.badge-count { background: var(--sapphire); color: white; font-size: 9px; font-weight: 700; border-radius: 99px; padding: 1px 5px; position: absolute; top: -4px; right: -4px; min-width: 14px; text-align: center; }
.badge-count.violet { background: var(--violet2); }
.badge-count.amber { background: var(--amber2); }
.new-attach-indicator { background: var(--gold); color: white; font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 99px; animation: glow-pulse 1.5s infinite; }
@keyframes glow-pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
.search-result-date-pill { background: var(--ink); color: var(--gold2); font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 99px; margin-right: auto; display: inline-flex; align-items: center; gap: 5px; font-family: var(--font-mono); letter-spacing: 0.3px; }
.search-result-date-pill svg { width: 11px; height: 11px; }

/* Case Title */
.case-title-wrap { padding: 10px 16px; text-align: center; border-bottom: 1px solid var(--paper2); }
.case-title { font-size: 20px; font-weight: 700; color: var(--ink); line-height: 1.3; letter-spacing: -0.4px; }

/* Case Body */
.case-body { padding: 12px 14px; }
.judge-room-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0; margin-bottom: 10px; }
.judge-room-row .meta-item { margin-bottom: 0; }
.judge-room-row .meta-item:first-child { padding-right: 10px; border-right: 1px solid var(--paper2); }
.judge-room-row .meta-item:last-child { padding-left: 10px; }
.meta-item { display: flex; flex-direction: column; gap: 3px; margin-bottom: 10px; }
.meta-label { font-size: 10px; color: var(--ink4); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; }
.meta-value { font-size: 13px; color: var(--ink2); font-weight: 500; line-height: 1.4; }
.meta-value.judge { color: var(--sapphire); font-weight: 700; font-size: 15px; }
.meta-value.room { color: var(--ink2); font-weight: 600; font-size: 14px; }
.meta-value.proceedings { font-size: 13px; color: var(--ink3); font-weight: 400; }

/* Actions row */
.case-actions { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-top: 1px solid var(--paper2); flex-wrap: wrap; background: var(--paper); }
.sr-field { display: flex; align-items: center; gap: 8px; }
.sr-input-label { font-size: 11px; color: var(--ink4); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
.sr-input { width: 64px; border: 1.5px solid var(--paper3); border-radius: 8px; padding: 6px 8px; font-size: 14px; font-family: var(--font-mono); color: var(--ink); background: white; text-align: center; font-weight: 600; }
.sr-input:focus { outline: none; border-color: var(--gold); }
.judge-status-wrap { display: flex; align-items: center; gap: 6px; margin-left: auto; }
.judge-label { font-size: 11px; color: var(--ink4); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.yn-btn { padding: 6px 14px; border-radius: 8px; border: 1.5px solid var(--paper3); background: white; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.15s; font-family: var(--font); }
.yn-btn.yes { border-color: var(--emerald2); color: var(--emerald); }
.yn-btn.yes.active { background: var(--emerald); color: white; border-color: var(--emerald); }
.yn-btn.no { border-color: var(--crimson2); color: var(--crimson); }
.yn-btn.no.active { background: var(--crimson2); color: white; border-color: var(--crimson2); }
.status-chip { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 99px; }
.status-chip.present { background: var(--emerald3); color: var(--emerald); }
.status-chip.absent { background: var(--crimson3); color: var(--crimson2); }
.status-chip.unknown { background: var(--paper2); color: var(--ink4); }
.status-chip::before { content:''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

/* Dates row */
.dates-row { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid var(--paper2); }
.date-field { display: flex; flex-direction: column; gap: 4px; padding: 10px 14px; }
.date-field:first-child { border-right: 1px solid var(--paper2); }
.date-field-label { font-size: 10px; color: var(--ink4); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; }
.last-date-val { font-size: 14px; font-weight: 600; color: var(--ink3); font-family: var(--font-mono); }
.last-date-val.empty { font-size: 13px; color: var(--ink4); font-family: var(--font); font-weight: 400; }
.next-date-picker { border: 1.5px solid var(--paper3); border-radius: 8px; padding: 6px 8px; font-size: 13px; font-family: var(--font); color: var(--ink2); background: white; width: 100%; cursor: pointer; font-weight: 500; }
.next-date-picker:focus { outline: none; border-color: var(--gold); }
.next-date-picker.set { border-color: var(--gold); background: #fef9ec; color: var(--gold); font-weight: 700; font-family: var(--font-mono); }

/* —— TASKS SECTION —— */
.tasks-section { border-top: 1px solid var(--paper2); }
.tasks-toggle { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; cursor: pointer; background: var(--violet3); }
.tasks-toggle:hover { background: #ede9fe; }
.tasks-toggle-left { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 700; color: var(--violet); text-transform: uppercase; letter-spacing: 0.8px; }
.tasks-toggle-left svg { width: 14px; height: 14px; }
.task-count-chip { background: var(--violet2); color: white; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 99px; }
.task-pending-chip { background: var(--amber2); color: white; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 99px; }
.task-done-chip { background: var(--emerald3); color: var(--emerald); font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 99px; }
.tasks-chevron { color: var(--violet); transition: transform 0.2s; }
.tasks-chevron.open { transform: rotate(180deg); }
.tasks-chevron svg { width: 14px; height: 14px; }
.tasks-body { display: none; padding: 0 14px 12px; background: white; }
.tasks-body.open { display: block; }
.task-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; padding-top: 10px; }
.task-item { border: 1px solid var(--paper3); border-radius: 10px; overflow: hidden; background: white; transition: all 0.2s; }
.task-item.completed { background: #f8fdf9; border-color: var(--emerald3); opacity: 0.85; }
.task-item-header { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; }
.task-checkbox { width: 20px; height: 20px; border-radius: 6px; border: 2px solid var(--paper3); flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; margin-top: 2px; }
.task-checkbox:hover { border-color: var(--emerald2); }
.task-checkbox.done { background: var(--emerald); border-color: var(--emerald); }
.task-checkbox.done svg { display: block; }
.task-checkbox svg { display: none; width: 12px; height: 12px; color: white; }
.task-content { flex: 1; min-width: 0; }
.task-nature { font-size: 14px; font-weight: 600; color: var(--ink); line-height: 1.4; }
.task-item.completed .task-nature { text-decoration: line-through; color: var(--ink4); }
.task-assignees { display: flex; align-items: center; gap: 8px; margin-top: 5px; flex-wrap: wrap; }
.task-assignee-chip { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 99px; }
.task-assignee-chip.by { background: var(--sapphire3); color: var(--sapphire); }
.task-assignee-chip.to { background: var(--violet3); color: var(--violet); }
.task-assignee-chip svg { width: 10px; height: 10px; }
.task-meta-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
.task-date-label { font-size: 10px; color: var(--ink4); }
.task-completed-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 700; color: var(--emerald); background: var(--emerald3); padding: 2px 7px; border-radius: 99px; }
.task-del-btn { background: none; border: none; cursor: pointer; color: var(--ink4); padding: 3px; flex-shrink: 0; }
.task-del-btn:hover { color: var(--crimson2); }
.task-del-btn svg { width: 13px; height: 13px; }
.task-attach-row { display: flex; align-items: center; gap: 6px; padding: 6px 12px 8px; border-top: 0.5px solid var(--paper2); background: var(--paper); flex-wrap: wrap; }
.task-attach-label { font-size: 10px; color: var(--ink4); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.task-attach-chip { display: inline-flex; align-items: center; gap: 5px; background: white; border: 0.5px solid var(--paper3); border-radius: 6px; padding: 3px 8px; font-size: 11px; color: var(--ink2); font-weight: 500; cursor: pointer; }
.task-attach-chip:hover { border-color: var(--sapphire2); color: var(--sapphire); }
.task-attach-chip svg { width: 11px; height: 11px; }
.task-attach-add { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; color: var(--violet); cursor: pointer; padding: 3px 8px; border: 0.5px dashed var(--violet2); border-radius: 6px; background: var(--violet3); }
.task-attach-add svg { width: 11px; height: 11px; }
.add-task-form { background: var(--paper); border: 1px solid var(--paper3); border-radius: 10px; padding: 12px; margin-bottom: 10px; }
.add-task-title { font-size: 12px; font-weight: 700; color: var(--violet); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.add-task-title svg { width: 13px; height: 13px; }
.task-form-field { margin-bottom: 9px; }
.task-form-label { display: block; font-size: 10px; font-weight: 600; color: var(--ink4); text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 4px; }
.task-form-input, .task-form-textarea { width: 100%; border: 1.5px solid var(--paper3); border-radius: 8px; padding: 8px 10px; font-size: 13px; font-family: var(--font); color: var(--ink); background: white; appearance: none; }
.task-form-input:focus, .task-form-textarea:focus { outline: none; border-color: var(--violet2); background: white; }
.task-form-textarea { resize: none; min-height: 56px; }
.task-form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.task-save-btn { width: 100%; padding: 10px; background: var(--violet2); color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: var(--font); display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 4px; }
.task-save-btn svg { width: 14px; height: 14px; }
.tasks-empty { text-align: center; padding: 18px; color: var(--ink4); font-size: 12px; }
.show-add-task-btn { width: 100%; padding: 9px; border: 1.5px dashed var(--violet2); border-radius: 8px; background: var(--violet3); color: var(--violet); font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--font); display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 4px; }
.show-add-task-btn svg { width: 14px; height: 14px; }

/* —— Comments Section —— */
.comments-section { border-top: 1px solid var(--paper2); padding: 12px 14px; background: var(--paper); }
.comments-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.comments-title { font-size: 11px; font-weight: 700; color: var(--ink4); text-transform: uppercase; letter-spacing: 0.8px; display: flex; align-items: center; gap: 6px; }
.comments-title svg { width: 13px; height: 13px; }
.comment-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 10px; }
.comment-item { background: white; border: 0.5px solid var(--paper3); border-radius: 8px; padding: 8px 10px; position: relative; }
.comment-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.comment-author { font-size: 11px; font-weight: 700; color: var(--sapphire); }
.comment-time { font-size: 10px; color: var(--ink4); }
.comment-text { font-size: 13px; color: var(--ink2); line-height: 1.5; }
.comment-del { position: absolute; top: 6px; right: 6px; background: none; border: none; cursor: pointer; color: var(--ink4); padding: 2px; opacity: 0.5; }

.comment-input-wrap { display: flex; gap: 7px; align-items: flex-end; }
.comment-input { flex: 1; border: 1.5px solid var(--paper3); border-radius: 8px; padding: 8px 10px; font-size: 13px; font-family: var(--font); color: var(--ink); background: white; resize: none; min-height: 38px; max-height: 100px; line-height: 1.4; }
.comment-input:focus { outline: none; border-color: var(--sapphire2); }
.comment-send-btn { width: 36px; height: 36px; border-radius: 8px; border: none; background: var(--sapphire); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.comment-send-btn svg { width: 15px; height: 15px; }
.commenter-name-wrap { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
.commenter-input { flex: 1; border: 1px solid var(--paper3); border-radius: 6px; padding: 5px 8px; font-size: 12px; font-family: var(--font); color: var(--ink); background: white; }
.commenter-input:focus { outline: none; border-color: var(--sapphire2); }
.commenter-label { font-size: 11px; color: var(--ink4); white-space: nowrap; font-weight: 500; }

/* —— Attachments Section —— */
.attach-section { border-top: 1px solid var(--paper2); }
.attach-toggle { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; cursor: pointer; background: white; }
.attach-toggle:hover { background: var(--paper); }

.attach-toggle-left svg { width: 14px; height: 14px; }
.attach-count { background: var(--sapphire3); color: var(--sapphire); font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 99px; }
.attach-new-indicator { background: var(--gold); color: white; font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 99px; animation: glow-pulse 1.5s infinite; }
.attach-chevron { color: var(--ink4); transition: transform 0.2s; }
.attach-chevron.open { transform: rotate(180deg); }
.attach-chevron svg { width: 14px; height: 14px; }
.attach-body { display: none; padding: 0 14px 12px; background: white; }
.attach-body.open { display: block; }
.attach-actions { display: flex; gap: 8px; margin-bottom: 10px; padding-top: 10px; }
.attach-action-btn { display: flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 8px; border: 1.5px solid var(--paper3); background: white; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--ink2); font-family: var(--font); flex: 1; justify-content: center; }
.attach-action-btn:hover { background: var(--paper); border-color: var(--sapphire2); color: var(--sapphire); }
.attach-action-btn svg { width: 15px; height: 15px; }
.attach-list { display: flex; flex-direction: column; gap: 7px; }
.attach-item { border: 0.5px solid var(--paper3); border-radius: 8px; overflow: hidden; background: white; }
.attach-item.new-today { border-color: var(--gold); border-width: 1.5px; }
.attach-item-header { display: flex; align-items: center; gap: 8px; padding: 8px 10px; }
.attach-thumb { width: 42px; height: 42px; border-radius: 6px; object-fit: cover; flex-shrink: 0; cursor: pointer; }
.attach-thumb-placeholder { width: 42px; height: 42px; border-radius: 6px; background: var(--sapphire3); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.attach-thumb-placeholder svg { width: 20px; height: 20px; color: var(--sapphire); }
.attach-info { flex: 1; min-width: 0; }
.attach-name { font-size: 13px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.attach-meta { font-size: 10px; color: var(--ink4); margin-top: 2px; display: flex; align-items: center; gap: 6px; }
.attach-date-badge { background: var(--gold); color: white; font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 99px; }
.attach-del-btn { background: none; border: none; cursor: pointer; color: var(--ink4); padding: 4px; }
.attach-del-btn:hover { color: var(--crimson2); }
.attach-del-btn svg { width: 13px; height: 13px; }
.attach-item-actions { display: flex; gap: 6px; padding: 6px 10px 8px; border-top: 0.5px solid var(--paper2); background: var(--paper); }
.attach-act-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px; padding: 7px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--font); border: 1.5px solid var(--paper3); background: white; color: var(--ink2); transition: all 0.15s; }
.attach-act-btn:hover { border-color: var(--sapphire2); color: var(--sapphire); background: var(--sapphire3); }
.attach-act-btn.share { border-color: var(--emerald2); color: var(--emerald); }
.attach-act-btn.share:hover { background: var(--emerald3); }
.attach-act-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
.attach-empty { text-align: center; padding: 18px; color: var(--ink4); font-size: 12px; }

/* Image viewer */
.img-viewer-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 600; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0; }
.img-viewer-topbar { position: absolute; top: 0; left: 0; right: 0; display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent); }
.img-viewer-name { font-size: 14px; font-weight: 600; color: white; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-right: 10px; }
.img-viewer-actions { display: flex; gap: 8px; }
.img-viewer-btn { display: flex; align-items: center; gap: 5px; padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: var(--font); border: none; }
.img-viewer-btn.download { background: var(--gold); color: white; }
.img-viewer-btn.share { background: var(--emerald); color: white; }
.img-viewer-btn.close { background: rgba(255,255,255,0.15); color: white; }

.img-viewer-img { max-width: 100%; max-height: calc(100vh - 120px); object-fit: contain; border-radius: 4px; margin-top: 52px; }

/* Name dialog */
.name-dialog-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 20px; }
.name-dialog { background: white; border-radius: 16px; padding: 22px; width: 100%; max-width: 340px; box-shadow: var(--shadow-lg); }
.name-dialog-title { font-size: 16px; font-weight: 700; color: var(--ink); margin-bottom: 5px; }
.name-dialog-sub { font-size: 13px; color: var(--ink3); margin-bottom: 14px; }
.name-dialog-input { width: 100%; border: 1.5px solid var(--paper3); border-radius: 10px; padding: 10px 12px; font-size: 14px; font-family: var(--font); color: var(--ink); background: var(--paper); margin-bottom: 12px; }
.name-dialog-input:focus { outline: none; border-color: var(--gold); background: white; }
.name-dialog-btns { display: flex; gap: 8px; }
.name-dialog-btn { flex: 1; padding: 11px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: var(--font); border: none; }
.name-dialog-btn.primary { background: var(--ink); color: var(--gold2); }
.name-dialog-btn.secondary { background: var(--paper2); color: var(--ink3); }

/* Advance row */
.advance-row { display: flex; align-items: center; padding: 10px 14px; border-top: 1px solid var(--paper2); background: #fef9ec; gap: 10px; }
.advance-note { font-size: 12px; color: var(--gold); font-weight: 500; flex: 1; }
.advance-btn { display: flex; align-items: center; gap: 6px; padding: 8px 18px; border-radius: 8px; border: none; background: var(--gold); color: white; font-size: 13px; font-weight: 700; cursor: pointer; font-family: var(--font); }
.advance-btn:hover { background: var(--gold2); }
.advance-btn svg { width: 14px; height: 14px; }

/* Sheets / Overlays */
.overlay { position: fixed; inset: 0; background: rgba(15,17,23,0.7); z-index: 200; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
.overlay.open { opacity: 1; pointer-events: all; }
.sheet { background: white; border-radius: 20px 20px 0 0; width: 100%; max-width: 600px; padding: 0 0 env(safe-area-inset-bottom,16px); transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.34,1.1,0.64,1); max-height: 90vh; overflow-y: auto; }
.overlay.open .sheet { transform: translateY(0); }
.sheet-handle { width: 40px; height: 4px; background: var(--paper3); border-radius: 2px; margin: 12px auto 0; }
.sheet-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--paper2); display: flex; align-items: center; justify-content: space-between; }
.sheet-title { font-size: 18px; font-weight: 700; color: var(--ink); letter-spacing: -0.3px; }
.sheet-close { width: 30px; height: 30px; border-radius: 50%; background: var(--paper2); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--ink3); }
.sheet-close svg { width: 16px; height: 16px; }
.sheet-body { padding: 16px 20px; }
.form-field { margin-bottom: 14px; }
.form-label { display: block; font-size: 11px; font-weight: 600; color: var(--ink4); text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 5px; }
.form-input, .form-textarea { width: 100%; border: 1.5px solid var(--paper3); border-radius: 10px; padding: 11px 13px; font-size: 15px; font-family: var(--font); color: var(--ink); background: var(--paper); appearance: none; }
.form-input:focus, .form-textarea:focus { outline: none; border-color: var(--gold); background: white; }
.form-textarea { resize: vertical; min-height: 72px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.btn-primary { width: 100%; padding: 14px; background: var(--ink); color: var(--gold2); border: none; border-radius: 12px; font-size: 15px; font-weight: 700; font-family: var(--font); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 8px; }
.btn-primary svg { width: 16px; height: 16px; }
.btn-danger { width: 100%; padding: 12px; background: white; color: var(--crimson2); border: 1.5px solid var(--crimson3); border-radius: 12px; font-size: 14px; font-weight: 600; font-family: var(--font); cursor: pointer; margin-top: 8px; }

/* Calendar Modal */
.cal-modal-overlay { position: fixed; inset: 0; background: rgba(15,17,23,0.8); z-index: 300; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; padding: 20px; }
.cal-modal-overlay.open { opacity: 1; pointer-events: all; }
.cal-modal { background: white; border-radius: 20px; padding: 24px; width: 100%; max-width: 380px; transform: scale(0.92); transition: transform 0.25s cubic-bezier(0.34,1.1,0.64,1); }
.cal-modal-overlay.open .cal-modal { transform: scale(1); }
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.cal-nav-btn { width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--paper3); background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--ink3); }
.cal-nav-btn svg { width: 16px; height: 16px; }
.cal-month-label { font-size: 18px; font-weight: 700; color: var(--ink); letter-spacing: -0.3px; }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
.cal-grid-header { font-size: 10px; font-weight: 700; color: var(--ink4); text-align: center; padding: 4px 0; text-transform: uppercase; }
.cal-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--ink2); position: relative; }
.cal-cell:hover { background: var(--paper2); }
.cal-cell.today { font-weight: 800; color: var(--gold); }
.cal-cell.selected { background: var(--ink); color: var(--gold2); }
.cal-cell.other-month { color: var(--ink4); opacity: 0.4; }
.cal-cell.has-cases::after { content:''; position: absolute; bottom: 3px; width: 4px; height: 4px; border-radius: 50%; background: var(--gold); }
.cal-cell.selected::after { background: var(--gold2); }

/* Toast */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--ink); color: white; padding: 10px 20px; border-radius: 99px; font-size: 13px; font-weight: 600; z-index: 999; transition: transform 0.3s cubic-bezier(0.34,1.1,0.64,1); white-space: nowrap; box-shadow: var(--shadow-lg); font-family: var(--font); }
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { background: var(--emerald); }
.toast.warning { background: var(--amber2); }
.toast.error { background: var(--crimson2); }

/* All Tasks Panel */
.panel-overlay { position: fixed; inset: 0; z-index: 200; background: var(--paper); display: none; flex-direction: column; overflow: hidden; }
.panel-overlay.open { display: flex; }
.panel-topbar { background: var(--ink); padding: 0 14px; display: flex; align-items: center; gap: 10px; height: 54px; flex-shrink: 0; }
.panel-topbar-title { font-size: 16px; font-weight: 700; color: var(--paper); flex: 1; letter-spacing: -0.2px; }
.panel-back-btn { width: 34px; height: 34px; border-radius: 10px; border: none; background: rgba(255,255,255,0.07); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--gold2); flex-shrink: 0; }
.panel-back-btn svg { width: 18px; height: 18px; }
.panel-filter-bar { padding: 10px 14px 6px; display: flex; gap: 6px; flex-wrap: wrap; background: white; border-bottom: 0.5px solid var(--paper3); flex-shrink: 0; }
.filter-pill { padding: 5px 13px; border-radius: 99px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--paper3); background: white; color: var(--ink3); transition: all 0.15s; font-family: var(--font); }
.filter-pill.active { background: var(--ink); color: var(--gold2); border-color: var(--ink); }
.panel-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.panel-section { padding: 12px 14px 30px; }
.panel-case-block { margin-bottom: 16px; }
.panel-case-title { font-size: 14px; font-weight: 700; color: var(--ink); padding: 8px 12px; background: var(--paper2); border-radius: 8px 8px 0 0; border: 1px solid var(--paper3); border-bottom: none; line-height: 1.3; }
.panel-case-date { font-size: 10px; color: var(--ink4); font-weight: 500; margin-top: 2px; font-family: var(--font-mono); }
.panel-items-wrap { border: 1px solid var(--paper3); border-radius: 0 0 8px 8px; overflow: hidden; background: white; }
.ptask-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border-bottom: 0.5px solid var(--paper2); }
.ptask-item:last-child { border-bottom: none; }
.ptask-cb { width: 20px; height: 20px; border-radius: 6px; border: 2px solid var(--paper3); flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; margin-top: 1px; }
.ptask-cb:hover { border-color: var(--emerald2); }
.ptask-cb.done { background: var(--emerald); border-color: var(--emerald); }
.ptask-cb.done svg { display: block; }
.ptask-cb svg { display: none; width: 12px; height: 12px; color: white; }
.ptask-info { flex: 1; min-width: 0; }
.ptask-nature { font-size: 13px; font-weight: 600; color: var(--ink); line-height: 1.4; }
.ptask-item.completed .ptask-nature { text-decoration: line-through; color: var(--ink4); }
.ptask-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
.ptask-chip { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 99px; }
.ptask-chip.by { background: var(--sapphire3); color: var(--sapphire); }
.ptask-chip.to { background: var(--violet3); color: var(--violet); }
.ptask-dates { font-size: 10px; color: var(--ink4); margin-top: 3px; display: flex; gap: 8px; flex-wrap: wrap; }
.ptask-done-badge { font-size: 10px; font-weight: 700; color: var(--emerald); background: var(--emerald3); padding: 2px 7px; border-radius: 99px; display: inline-flex; align-items: center; gap: 3px; }
.panel-empty { text-align: center; padding: 40px 16px; color: var(--ink4); }
.panel-empty svg { width: 40px; height: 40px; opacity: 0.25; margin-bottom: 10px; display: block; margin-left: auto; margin-right: auto; }
.panel-empty p { font-size: 14px; }

/* Per-case Tasks icon styling (light theme default) */
.icon-btn.tasks-btn { background: var(--violet3); color: var(--violet2); }
.icon-btn.tasks-btn:hover { background: #ede9fe; }

/* Collapsed/expanded case cards */
.case-card.collapsed .case-body,
.case-card.collapsed .case-actions,
.case-card.collapsed .dates-row,
.case-card.collapsed .tasks-section,
.case-card.collapsed .comments-section,
.case-card.collapsed .attach-section,
.case-card.collapsed .advance-row { display: none; }
.case-card.collapsed .case-title-wrap { border-bottom: none; }
.case-chevron { transition: transform 0.2s; }
.case-chevron.open { transform: rotate(180deg); }
.case-title-clickable { cursor: pointer; user-select: none; }

/* Dark theme — applies only to collapsed cards. Expanded cards keep
   the light theme defined elsewhere. */
.case-card.collapsed {
  background: var(--ink2);
  border-color: var(--ink2);
  color: var(--paper);
}
.case-card.collapsed.next-set {
  /* Keep the gold accent visible against the dark fill */
  border-color: var(--gold);
}
.case-card.collapsed .case-title { color: var(--paper); }
.case-card.collapsed .icon-btn {
  background: rgba(255,255,255,0.07);
  color: var(--gold2);
}
.case-card.collapsed .icon-btn:hover { background: rgba(255,255,255,0.14); }
.case-card.collapsed .icon-btn.tasks-btn {
  background: rgba(124,58,237,0.25);
  color: #c4b5fd;
}
.case-card.collapsed .icon-btn.tasks-btn:hover { background: rgba(124,58,237,0.4); }
.case-card.collapsed .case-chevron { color: var(--gold2); }
.case-card.collapsed .search-result-date-pill {
  background: rgba(255,255,255,0.1);
  color: var(--gold2);
}
.case-card.collapsed .new-attach-indicator {
  /* The gold/white pill already pops on dark, no change needed,
     but tighten the inline margin-right:auto via the existing rule. */
}

/* Expand-all toggle in date heading */
.expand-all-btn { background: white; border: 1px solid var(--paper3); color: var(--ink3); font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 99px; cursor: pointer; font-family: var(--font); white-space: nowrap; }
.expand-all-btn:hover { background: var(--paper2); border-color: var(--ink3); color: var(--ink); }

/* Close-case button in edit sheet */
.btn-warning { width: 100%; padding: 12px; background: var(--amber3); color: var(--amber); border: 1.5px solid var(--amber2); border-radius: 12px; font-size: 14px; font-weight: 600; font-family: var(--font); cursor: pointer; margin-top: 8px; }
.btn-warning:hover { background: #fce6c2; }

/* All Attachments panel rows */
.pattach-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-bottom: 0.5px solid var(--paper2); cursor: pointer; }
.pattach-item:last-child { border-bottom: none; }
.pattach-item:hover { background: var(--paper); }
.pattach-thumb { width: 38px; height: 38px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
.pattach-placeholder { width: 38px; height: 38px; border-radius: 6px; background: var(--sapphire3); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.pattach-placeholder svg { width: 18px; height: 18px; color: var(--sapphire); }
.pattach-info { flex: 1; min-width: 0; }
.pattach-name { font-size: 13px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pattach-meta { font-size: 10px; color: var(--ink4); margin-top: 2px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.pattach-new { background: var(--gold); color: white; font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 99px; }
.pattach-source { font-size: 10px; color: var(--ink4); padding: 1px 6px; border-radius: 99px; background: var(--paper2); }
.pattach-act { display: flex; gap: 5px; flex-shrink: 0; }
.pattach-btn { width: 28px; height: 28px; border-radius: 6px; border: 0.5px solid var(--paper3); background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--ink3); }
.pattach-btn:hover { border-color: var(--sapphire2); color: var(--sapphire); }
.pattach-btn.share { border-color: var(--emerald2); color: var(--emerald); }
.pattach-btn svg { width: 13px; height: 13px; }

/* Closed Cases panel rows */
.closed-case-row { background: white; border: 1px solid var(--paper3); border-radius: 10px; padding: 12px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.closed-case-info { flex: 1; min-width: 0; }
.closed-case-title { font-size: 14px; font-weight: 700; color: var(--ink); }
.closed-case-meta { font-size: 11px; color: var(--ink4); margin-top: 4px; display: flex; gap: 10px; flex-wrap: wrap; }
.closed-reopen-btn { background: var(--gold); color: white; border: none; border-radius: 8px; padding: 7px 14px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: var(--font); flex-shrink: 0; }
.closed-reopen-btn:hover { background: var(--gold2); }

/* Cramped-header relief: hide sync label on narrow screens */
@media (max-width: 520px) { .sync-label { display: none; } }

.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.main-content { padding-bottom: 80px; }
</style>

<body>

  <div class="header-inner">
    <div class="brand">
      <div class="brand-seal">W</div>
      <div class="brand-text"><div class="brand-name">Wakala</div><div class="brand-sub" dir="rtl">ہر پیشی - ہر کام - ایک جگہ</div></div>

<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>

<script>
/* ── Baked-in Firebase config (auc-court-tracker) ── */
const firebaseConfig = {
  apiKey: "AIzaSyAckd8M6zw5fadpe9OZBfEop-X4vzA-km8",
  authDomain: "auc-court-tracker.firebaseapp.com",
  projectId: "auc-court-tracker",
  storageBucket: "auc-court-tracker.firebasestorage.app",
  messagingSenderId: "706635940238",
  appId: "1:706635940238:web:6d34a31d044661419b64df",
  measurementId: "G-NW93YG975R"
};

const COMMENTER_KEY = 'auc_commenter_name';
const ATTACH_MAX_BYTES = 900_000; // Firestore doc cap is 1 MiB — leave headroom for other fields

let db = null, casesCol = null;
let cases = [], selectedDate = todayStr(), calViewDate = new Date(), editingId = null;
let pendingAttachCaseId = null, pendingAttachFile = null, pendingAttachDataUrl = null;
let pendingTaskCaseId = null, pendingTaskId = null;
let firstSnapshotReceived = false;
let searchQuery = '';
let taskFilter = 'all';
let attachFilter = 'all';
let expandedCases = new Set();    // IDs of cases currently expanded
// Image viewer state — supports both case attachments and task attachments
let ivCaseId = null, ivIdx = null, ivIsTask = false, ivTaskId = null;

/* ── Helpers ── */
function todayStr(){ return new Date().toISOString().split('T')[0]; }
function fmtDMY(d){ if(!d) return ''; const [y,m,day]=d.split('-'); return `${day}-${m}-${y}`; }
function fmtShort(d){ if(!d) return ''; return new Date(d+'T00:00:00').toLocaleDateString('en-PK',{day:'2-digit',month:'short'}); }
function nowLabel(){ return new Date().toLocaleString('en-PK',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit',hour12:true}); }
function getCommenterName(){ return localStorage.getItem(COMMENTER_KEY)||''; }
function uid(){ return (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : (Date.now().toString(36)+Math.random().toString(36).slice(2,8)); }
function escapeHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ── Firebase init + listen ── */
function initFirebase(){
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    casesCol = db.collection('cases');
  } catch(err) {
    showToast('Firebase init failed: '+err.message,'error');
    setSyncStatus('error');
    return;
  }
  setSyncStatus('connecting');
  casesCol.onSnapshot(
    snap => {
      cases = snap.docs.map(d => d.data());
      firstSnapshotReceived = true;
      setSyncStatus(navigator.onLine ? 'live' : 'offline');
      render();
    },
    err => {
      console.error('Firestore listen error:', err);
      setSyncStatus('error');
      showToast('Sync error: '+err.message,'error');
    }
  );
  window.addEventListener('online',  () => firstSnapshotReceived && setSyncStatus('live'));
  window.addEventListener('offline', () => setSyncStatus('offline'));
}

function setSyncStatus(state){
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  if(!dot || !lbl) return;
  dot.className = 'sync-dot'; lbl.className = 'sync-label';
  if(state==='live')       { dot.classList.add('live');  lbl.classList.add('live'); lbl.textContent = 'Live'; }
  else if(state==='error') { dot.classList.add('error'); lbl.textContent = 'Error'; }
  else if(state==='offline'){ dot.classList.add('error'); lbl.textContent = 'Offline'; }
  else                     { lbl.textContent = 'Connecting…'; }
}

function saveToFirebase(c){ return casesCol.doc(c.id).set(c); }
function deleteFromFirebase(id){ return casesCol.doc(id).delete(); }

/* ── Search ── */
function onSearchInput(val){
  searchQuery = val.trim();
  document.getElementById('search-clear').classList.toggle('show', searchQuery.length > 0);
  render();
}
function clearSearch(){
  document.getElementById('search-input').value = '';
  searchQuery = '';
  document.getElementById('search-clear').classList.remove('show');
  render();
}
function caseMatches(c, q){
  if(!q) return true;
  q = q.toLowerCase();
  const hay = [
    c.title, c.judge, c.room, c.proceedings,
    ...(c.comments || []).map(cm => (cm.text||'')+' '+(cm.author||'')),
    ...(c.tasks || []).map(t => (t.nature||'')+' '+(t.assignedBy||'')+' '+(t.assignedTo||'')),
    ...(c.attachments || []).map(a => a.name||''),
    ...(c.tasks || []).flatMap(t => (t.attachments||[]).map(a => a.name||''))
  ].filter(Boolean).join(' ').toLowerCase();
  return hay.includes(q);
}

/* ── Render ── */
function render(){ renderCalStrip(); renderStats(); renderCases(); updateHeaderDate(); updateTasksBadge(); updateAttachBadge(); updateClosedBadge(); }

function updateHeaderDate(){
  document.getElementById('header-date-label').textContent = selectedDate===todayStr() ? 'Today' : fmtShort(selectedDate);
}

function updateTasksBadge(){
  const badge = document.getElementById('hdr-tasks-badge');
  if(!badge) return;
  const pending = cases.filter(c => !c.closed).reduce((s,c) => s + (c.tasks||[]).filter(t => !t.completed).length, 0);
  if(pending > 0){ badge.textContent = pending; badge.style.display = ''; }
  else badge.style.display = 'none';
}
function updateAttachBadge(){
  const badge = document.getElementById('hdr-attach-badge');
  if(!badge) return;
  const today = todayStr();
  const newToday = cases.filter(c => !c.closed).reduce((s,c) => {
    const caseNew = (c.attachments||[]).filter(a => a.addedDate===today).length;
    const taskNew = (c.tasks||[]).reduce((s2,t) => s2 + (t.attachments||[]).filter(a => a.addedDate===today).length, 0);
    return s + caseNew + taskNew;
  }, 0);
  if(newToday > 0){ badge.textContent = newToday; badge.style.display = ''; }
  else badge.style.display = 'none';
}
function updateClosedBadge(){
  const badge = document.getElementById('hdr-closed-badge');
  if(!badge) return;
  const closed = cases.filter(c => c.closed).length;
  if(closed > 0){ badge.textContent = closed; badge.style.display = ''; }
  else badge.style.display = 'none';
}

function renderCalStrip(){
  const container = document.getElementById('cal-strip-inner');
  const today = new Date(); container.innerHTML = '';
  const eb = document.createElement('button'); eb.className = 'cal-expand-btn';
  eb.innerHTML = `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><span style="font-size:9px;color:var(--ink4)">Full</span>`;
  eb.onclick = openCalModal; container.appendChild(eb);
  for(let i=-3; i<=14; i++){
    const d = new Date(today); d.setDate(today.getDate()+i);
    const ds = d.toISOString().split('T')[0];
    const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const hasCases = cases.some(c => !c.closed && (c.date===ds || c.nextDate===ds));
    const isActive = ds===selectedDate && !searchQuery, isToday = ds===todayStr();
    const div = document.createElement('div');
    div.className = 'cal-day' + (isActive?' active':'') + (hasCases?' has-cases':'');
    div.innerHTML = `<span class="day-name">${dayNames[d.getDay()]}</span><span class="day-num" style="${isToday&&!isActive?'color:var(--gold2)':''}">${d.getDate()}</span>${hasCases?'<span class="day-dot"></span>':''}`;
    div.onclick = () => {
      selectedDate = ds;
      if(searchQuery){ document.getElementById('search-input').value = ''; document.getElementById('search-clear').classList.remove('show'); searchQuery = ''; }
      render(); window.scrollTo({top:0,behavior:'smooth'});
    };
    container.appendChild(div);
  }
  setTimeout(() => { const a = container.querySelector('.active'); if(a) a.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}); }, 50);
}

function renderStats(){
  const inSearch = !!searchQuery;
  const closedCount = cases.filter(c => c.closed).length;
  const closedPill = `<div class="stat-pill clickable" onclick="openPanel('closed')" title="View closed cases"><div class="stat-dot" style="background:var(--ink4)"></div><span class="stat-num">${closedCount}</span> Closed</div>`;
  if(inSearch){
    const matched = cases.filter(c => !c.closed && caseMatches(c, searchQuery));
    const pending = matched.reduce((s,c) => s + (c.tasks||[]).filter(t => !t.completed).length, 0);
    document.getElementById('stats-bar').innerHTML = `
      <div class="stat-pill"><div class="stat-dot" style="background:var(--ink2)"></div><span class="stat-num">${matched.length}</span> Match${matched.length===1?'':'es'}</div>
      <div class="stat-pill"><div class="stat-dot" style="background:var(--violet2)"></div><span class="stat-num">${pending}</span> Pending Task${pending===1?'':'s'}</div>
      ${closedPill}`;
    return;
  }
  const dc = cases.filter(c => !c.closed && c.date===selectedDate);
  const total = dc.length, present = dc.filter(c=>c.judgeStatus==='Y').length;
  const absent = dc.filter(c=>c.judgeStatus==='N').length, withNext = dc.filter(c=>c.nextDate).length;
  const pendingTasks = dc.reduce((s,c) => s + (c.tasks||[]).filter(t => !t.completed).length, 0);
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-pill"><div class="stat-dot" style="background:var(--ink2)"></div><span class="stat-num">${total}</span> Cases</div>
    <div class="stat-pill"><div class="stat-dot" style="background:var(--emerald)"></div><span class="stat-num">${present}</span> Judge Present</div>
    <div class="stat-pill"><div class="stat-dot" style="background:var(--crimson2)"></div><span class="stat-num">${absent}</span> Absent</div>
    <div class="stat-pill"><div class="stat-dot" style="background:var(--gold)"></div><span class="stat-num">${withNext}</span> Next Date Set</div>
    <div class="stat-pill"><div class="stat-dot" style="background:var(--violet2)"></div><span class="stat-num">${pendingTasks}</span> Pending Task${pendingTasks===1?'':'s'}</div>
    ${closedPill}`;
}

function renderCases(){
  const container = document.getElementById('main-cases');
  const inSearch = !!searchQuery;

  let dc;
  if(inSearch){
    dc = cases.filter(c => !c.closed && caseMatches(c, searchQuery))
      .sort((a,b) => (a.date||'').localeCompare(b.date||'') || (a.srNo||9999) - (b.srNo||9999));
  } else {
    dc = cases.filter(c => !c.closed && c.date===selectedDate).sort((a,b) => (a.srNo||9999) - (b.srNo||9999));
  }

  if(!dc.length){
    const heading = inSearch
      ? `<div class="date-heading"><div class="date-heading-line"></div><div class="date-heading-text">Search</div><div class="date-heading-line"></div></div>`
      : `<div class="date-heading"><div class="date-heading-line"></div><div class="date-heading-text">${fmtDMY(selectedDate)}</div><div class="date-heading-line"></div></div>`;
    const body = inSearch
      ? `<div class="no-cases"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><circle stroke-linecap="round" stroke-linejoin="round" stroke-width="1" cx="11" cy="11" r="8"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M21 21l-4.35-4.35"/></svg><p>No cases match "${escapeHtml(searchQuery)}".</p></div>`
      : `<div class="no-cases"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg><p>No cases scheduled for this date.</p><p style="margin-top:6px;font-size:12px">Tap + to add a case.</p></div>`;
    container.innerHTML = heading + body;
    return;
  }

  const anyExpanded = dc.some(c => expandedCases.has(c.id));
  const expandBtn = `<button class="expand-all-btn" onclick="${anyExpanded?'collapseAllVisible':'expandAllVisible'}()">${anyExpanded?'Collapse all':'Expand all'}</button>`;
  let html = inSearch
    ? `<div class="date-heading"><div class="date-heading-line"></div><div class="date-heading-text">Search results</div><span class="date-badge">${dc.length} match${dc.length>1?'es':''}</span>${expandBtn}<div class="date-heading-line"></div></div>`
    : `<div class="date-heading"><div class="date-heading-line"></div><div class="date-heading-text">${fmtDMY(selectedDate)}</div><span class="date-badge">${dc.length} case${dc.length>1?'s':''}</span>${expandBtn}<div class="date-heading-line"></div></div>`;

  dc.forEach(c => {

          </div>

          <button class="task-del-btn" onclick="deleteTask('${c.id}','${t.id}')" title="Remove task"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg></button>
        </div>
        <div class="task-attach-row">
          <span class="task-attach-label">📎</span>

            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>

            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Photo

    }).join('');

    const isExpanded = expandedCases.has(c.id);
    html += `<div class="case-card ${c.nextDate?'next-set':''} ${isExpanded?'expanded':'collapsed'}" id="card-${c.id}">

      <div class="card-topbar">
        ${inSearch ? `<span class="search-result-date-pill"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>${fmtDMY(c.date)}</span>`

          <div class="comment-item">
            <div class="comment-meta"><span class="comment-author">${escapeHtml(cm.author||'Team')}</span><span class="comment-time">${escapeHtml(cm.time||'')}</span></div>
            <div class="comment-text">${escapeHtml(cm.text)}</div>
            <button class="comment-del" onclick="deleteComment('${c.id}',${idx})" title="Delete comment">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
          </div>`).join('')}</div>` : ''}
        <div class="commenter-name-wrap">
          <span class="commenter-label">Your name:</span>
          <input type="text" class="commenter-input" id="commenter-${c.id}" value="${escapeHtml(getCommenterName())}" placeholder="Enter your name" onchange="saveCommenterName(this.value)">

        <div class="comment-input-wrap">

        <div class="attach-toggle" onclick="toggleAttach('${c.id}')">

            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
            See Attachments
            ${attachCount>0?`<span class="attach-count">${attachCount}</span>`:''}

          </div>

        </div>
        <div class="attach-body" id="attach-body-${c.id}">

            <button class="attach-action-btn" onclick="triggerCamera('${c.id}')"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>Take Photo</button>

                <div class="attach-item-header">
                  ${isImg?`<img src="${a.dataUrl}" class="attach-thumb" onclick="openViewer('${c.id}',${idx})" alt="${escapeHtml(a.name)}" title="Tap to view">`:`<div class="attach-thumb-placeholder" style="${hasData?'cursor:pointer':''}" onclick="${hasData?`openViewer('${c.id}',${idx})`:''}" title="${hasData?'Tap to open':''}"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>`}
                  <div class="attach-info">

/* ── Case actions ── */
function updateSr(id,val){
  const c = cases.find(x => x.id===id); if(!c) return;
  c.srNo = parseInt(val)||null;
  saveToFirebase(c).then(() => showToast('Sr # updated','success')).catch(e => showToast('Error: '+e.message,'error'));
}
function setJudgeStatus(id,status){
  const c = cases.find(x => x.id===id); if(!c) return;
  c.judgeStatus = c.judgeStatus===status ? null : status;
  saveToFirebase(c)
    .then(() => showToast(c.judgeStatus==='Y'?'Judge marked present':c.judgeStatus==='N'?'Judge marked absent':'Status cleared','success'))
    .catch(e => showToast('Error: '+e.message,'error'));
}
function setNextDate(id,val){
  const c = cases.find(x => x.id===id); if(!c) return;
  c.nextDate = val||null;
  saveToFirebase(c)
    .then(() => { if(val) showToast('Next date noted: '+fmtDMY(val),'success'); })
    .catch(e => showToast('Error: '+e.message,'error'));
}
function advanceCase(id){
  const c = cases.find(x => x.id===id);
  if(!c||!c.nextDate){ showToast('Set next date first','warning'); return; }
  const newDate = c.nextDate;
  c.lastDate = c.date; c.date = newDate; c.nextDate = null;
  c.judgeStatus = null; c.srNo = null; c.done = false;
  c.comments = [];
  // Tasks carry forward — do NOT clear them
  saveToFirebase(c)
    .then(() => { selectedDate = newDate; showToast('Case advanced to '+fmtDMY(newDate),'success'); })
    .catch(e => showToast('Error: '+e.message,'error'));
}

/* ── Tasks ── */
function toggleTasks(caseId){
  // If the card is collapsed, expand it first so the tasks section is visible.
  if(!expandedCases.has(caseId)){
    expandedCases.add(caseId);
    render();
    setTimeout(() => {
      const body = document.getElementById('tasks-body-'+caseId);
      const chev = document.getElementById('tasks-chevron-'+caseId);
      if(body && !body.classList.contains('open')){ body.classList.add('open'); if(chev) chev.classList.add('open'); }
    }, 30);
    return;
  }
  const body = document.getElementById('tasks-body-'+caseId);
  const chev = document.getElementById('tasks-chevron-'+caseId);
  if(body){ body.classList.toggle('open'); if(chev) chev.classList.toggle('open'); }
}
function toggleAddTaskForm(caseId){
  const form = document.getElementById('add-task-form-'+caseId);
  if(form) form.style.display = form.style.display==='none' ? 'block' : 'none';
}
function saveTask(caseId){
  const c = cases.find(x => x.id===caseId); if(!c) return;
  const nature = document.getElementById('tf-nature-'+caseId).value.trim();
  const by = document.getElementById('tf-by-'+caseId).value.trim();
  const to = document.getElementById('tf-to-'+caseId).value.trim();
  if(!nature||!by||!to){ showToast('Nature, Assigned By and Assigned To are required','warning'); return; }
  if(!c.tasks) c.tasks = [];
  c.tasks.push({ id: uid(), nature, assignedBy: by, assignedTo: to, assignedDate: todayStr(), completed: false, completedDate: null, attachments: [] });
  saveToFirebase(c)
    .then(() => { showToast('Task saved','success'); setTimeout(() => { const body = document.getElementById('tasks-body-'+caseId); if(body && !body.classList.contains('open')) body.classList.add('open'); }, 80); })
    .catch(e => showToast('Error: '+e.message,'error'));
}
function toggleTask(caseId,taskId){
  const c = cases.find(x => x.id===caseId); if(!c) return;
  const t = (c.tasks||[]).find(x => x.id===taskId); if(!t) return;
  t.completed = !t.completed;
  t.completedDate = t.completed ? todayStr() : null;
  saveToFirebase(c)
    .then(() => { showToast(t.completed?'Task marked complete':'Task reopened','success'); setTimeout(() => { const body = document.getElementById('tasks-body-'+caseId); if(body && !body.classList.contains('open')) body.classList.add('open'); }, 80); })
    .catch(e => showToast('Error: '+e.message,'error'));
}
function deleteTask(caseId,taskId){
  const c = cases.find(x => x.id===caseId); if(!c) return;
  if(!confirm('Delete this task?')) return;
  c.tasks = (c.tasks||[]).filter(x => x.id!==taskId);
  saveToFirebase(c)
    .then(() => showToast('Task deleted','success'))
    .catch(e => showToast('Error: '+e.message,'error'));
}

/* ── Task attachments ── */
function triggerTaskAttach(caseId,taskId,type){
  pendingTaskCaseId = caseId; pendingTaskId = taskId;
  document.getElementById(type==='camera'?'task-camera-input':'task-gallery-input').click();
}
async function handleTaskAttachFile(event){
  const file = event.target.files[0];
  event.target.value = '';
  if(!file || !pendingTaskCaseId || !pendingTaskId) return;
  const dataUrl = await readAndMaybeCompress(file);
  if(!dataUrl) return;
  pendingAttachFile = file;
  pendingAttachDataUrl = dataUrl;

function approxDataUrlBytes(dataUrl){
  if(!dataUrl) return 0;
  const idx = dataUrl.indexOf(',');
  const b64 = idx >= 0 ? dataUrl.slice(idx+1) : dataUrl;
  return Math.floor(b64.length * 3 / 4);
}
function compressImageDataUrl(dataUrl, maxDim, quality){
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
      const w = Math.max(1, Math.round(img.width * scale));
      const h = Math.max(1, Math.round(img.height * scale));
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => reject(new Error('Could not decode image'));
    img.src = dataUrl;
  });
}

// Read a file and compress images down to fit Firestore's 1MB document cap.
// Returns the resulting dataUrl, or null if too large after compression.
function readAndMaybeCompress(file){
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = async ev => {
      let dataUrl = ev.target.result;
      if(file.type && file.type.startsWith('image/')){
        if(approxDataUrlBytes(dataUrl) > ATTACH_MAX_BYTES){
          showToast('Compressing image…','');
          try {
            dataUrl = await compressImageDataUrl(dataUrl, 1280, 0.75);
            if(approxDataUrlBytes(dataUrl) > ATTACH_MAX_BYTES) dataUrl = await compressImageDataUrl(dataUrl, 1024, 0.6);
            if(approxDataUrlBytes(dataUrl) > ATTACH_MAX_BYTES) dataUrl = await compressImageDataUrl(dataUrl, 800, 0.5);
          } catch(e){ console.error(e); }
        }
      }
      if(approxDataUrlBytes(dataUrl) > ATTACH_MAX_BYTES){
        const kb = Math.round(approxDataUrlBytes(dataUrl)/1024);
        showToast(`File too large (${kb} KB). Max ~900 KB per attachment.`,'error');
        resolve(null); return;
      }
      resolve(dataUrl);
    };
    reader.readAsDataURL(file);
  });
}

async function handleAttachFile(event){
  const file = event.target.files[0];
  event.target.value = '';
  if(!file || !pendingAttachCaseId) return;
  const dataUrl = await readAndMaybeCompress(file);
  if(!dataUrl) return;
  pendingAttachFile = file;
  pendingAttachDataUrl = dataUrl;
  document.getElementById('attach-name-input').value = file.name.replace(/\.[^.]+$/,'');
  document.getElementById('name-dialog').style.display = '';
}

function confirmAttach(){

  if(pendingTaskCaseId && pendingTaskId){

    const t = (c.tasks||[]).find(x => x.id===pendingTaskId); if(!t){ cancelAttach(); return; }
    if(!t.attachments) t.attachments = [];
    t.attachments.push({

      .catch(e => showToast('Error: '+e.message,'error'));

  }
  // Case attachment path
  if(!pendingAttachCaseId){ cancelAttach(); return; }

  if(!c.attachments) c.attachments = [];

    name,

  document.getElementById('cal-month-label').textContent = months[calViewDate.getMonth()]+' '+calViewDate.getFullYear();

  const first = new Date(calViewDate.getFullYear(),calViewDate.getMonth(),1);
  const last = new Date(calViewDate.getFullYear(),calViewDate.getMonth()+1,0);
  const allDates = [...new Set(cases.filter(c => !c.closed).flatMap(c => [c.date,c.nextDate].filter(Boolean)))];
  const today = todayStr();
  for(let i=0; i<first.getDay(); i++){
    const d = new Date(first); d.setDate(d.getDate()-(first.getDay()-i));
    const ds = d.toISOString().split('T')[0];
    html += `<div class="cal-cell other-month ${allDates.includes(ds)?'has-cases':''} ${ds===selectedDate?'selected':''}" onclick="pickCalDate('${ds}')">${d.getDate()}</div>`;

  for(let i=1; i<=last.getDate(); i++){
    const d = new Date(calViewDate.getFullYear(),calViewDate.getMonth(),i);

    html += `<div class="cal-cell ${ds===today?'today':''} ${allDates.includes(ds)?'has-cases':''} ${ds===selectedDate?'selected':''}" onclick="pickCalDate('${ds}')">${i}</div>`;

function getCaseAttach(caseId,idx){ const c = cases.find(x => x.id===caseId); if(!c||!c.attachments) return null; return c.attachments[idx]||null; }
function getCurrentAttach(){ return ivIsTask ? getTaskAttach(ivCaseId,ivTaskId,ivIdx) : getCaseAttach(ivCaseId,ivIdx); }

function openViewer(caseId,idx){

function showViewer(a){
  if(!a.dataUrl){ showToast('File data not available','warning'); return; }
  if(a.type && a.type.startsWith('image/')){
    document.getElementById('iv-name').textContent = a.name;
    document.getElementById('iv-img').src = a.dataUrl;
    document.getElementById('iv-img').alt = a.name;
    const sb = document.getElementById('iv-share-btn'); if(sb) sb.style.display = navigator.share ? '' : 'none';
    document.getElementById('img-viewer').style.display = '';
    document.body.style.overflow = 'hidden';
  } else {
    const w = window.open();
    if(w){ w.document.write('<iframe src="'+a.dataUrl+'" style="width:100%;height:100%;border:none;position:fixed;inset:0"></iframe>'); w.document.title = a.name; }
    else { showToast('Allow pop-ups to open files','warning'); }
  }
}
function closeImgViewer(){ document.getElementById('img-viewer').style.display = 'none'; document.body.style.overflow = ''; ivCaseId = null; ivIdx = null; ivIsTask = false; ivTaskId = null; }
function downloadAttach(){ const a = getCurrentAttach(); if(!a||!a.dataUrl) return; doDownload(a.dataUrl,a.name,a.type); }
function downloadSingleAttach(caseId,idx){ const a = getCaseAttach(caseId,idx); if(!a||!a.dataUrl){ showToast('No file data','warning'); return; } doDownload(a.dataUrl,a.name,a.type); showToast('Saving: '+a.name,'success'); }
function doDownload(dataUrl,name,type){
  const ext = type ? '.'+type.split('/')[1].split(';')[0] : '';
  const filename = name + (name.includes('.') ? '' : ext);
  const link = document.createElement('a');
  link.href = dataUrl; link.download = filename;
  document.body.appendChild(link); link.click(); document.body.removeChild(link);
}
async function shareAttach(){ const a = getCurrentAttach(); if(!a||!a.dataUrl) return; await doShare(a); }
async function shareSingleAttach(caseId,idx){ const a = getCaseAttach(caseId,idx); if(!a||!a.dataUrl){ showToast('No file data','warning'); return; } await doShare(a); }
async function doShare(a){
  if(!a.dataUrl){ showToast('No file data available','warning'); return; }
  try {
    const res = await fetch(a.dataUrl);
    const blob = await res.blob();
    const ext = blob.type ? '.'+blob.type.split('/')[1] : '';
    const filename = a.name + (a.name.includes('.') ? '' : ext);
    const file = new File([blob], filename, { type: blob.type });
    if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({ title: a.name, text: 'Attachment: '+a.name+' — Wakala', files: [file] });
      showToast('Shared successfully','success');
    } else if(navigator.share){
      await navigator.share({ title: a.name, text: 'Attachment: '+a.name+' from Wakala' });
    } else {
      showToast('Use Save to download on desktop','warning');
      doDownload(a.dataUrl,a.name,a.type);
    }
  } catch(err){
    if(err.name !== 'AbortError') showToast('Share failed: '+err.message,'error');
  }
}

  showToast('Saving: '+a.name,'success');
}
async function shareByRef(caseId, taskId, idx){
  const a = getAttachByRef(caseId, taskId, idx);
  if(!a){ showToast('Attachment not found','warning'); return; }
  if(!a.dataUrl){ showToast('No file data','warning'); return; }
  await doShare(a);
}
function openByRef(caseId, taskId, idx){
  if(taskId) openTaskAttachViewer(caseId, taskId, idx);
  else       openViewer(caseId, idx);
}

function renderAttachPanel(){
  const container = document.getElementById('attach-panel-content');
  const summary = document.getElementById('attach-panel-summary');
  const today = todayStr();
  const all = [];
  cases.forEach(c => {
    if(c.closed) return;
    (c.attachments||[]).forEach((a,idx) => all.push({ caseId: c.id, caseTitle: c.title, caseDate: c.date, a, idx, source: 'Case file', taskId: null }));
    (c.tasks||[]).forEach(t => {
      const tag = 'Task: '+((t.nature||'').substring(0,30))+((t.nature||'').length>30?'…':'');
      (t.attachments||[]).forEach((a,idx) => all.push({ caseId: c.id, caseTitle: c.title, caseDate: c.date, a, idx, source: tag, taskId: t.id }));
    });
  });
  summary.textContent = `${all.length} total attachment${all.length===1?'':'s'}`;
  updateAttachBadge();

  let filtered = all;
  if(attachFilter==='today')  filtered = all.filter(x => x.a.addedDate===today);
  if(attachFilter==='images') filtered = all.filter(x => x.a.type && x.a.type.startsWith('image/'));
  if(attachFilter==='docs')   filtered = all.filter(x => !x.a.type || !x.a.type.startsWith('image/'));

  if(!filtered.length){
    container.innerHTML = `<div class="panel-empty"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg><p>No attachments found</p></div>`;
    return;
  }

  // Group by caseId, preserve insertion order
  const byCase = {};
  filtered.forEach(x => {
    if(!byCase[x.caseId]) byCase[x.caseId] = { caseTitle: x.caseTitle, caseDate: x.caseDate, items: [] };
    byCase[x.caseId].items.push(x);
  });

  let html = '';
  Object.values(byCase).forEach(group => {
    html += `<div class="panel-case-block">
      <div class="panel-case-title">${escapeHtml(group.caseTitle)}<div class="panel-case-date">${fmtDMY(group.caseDate)}</div></div>
      <div class="panel-items-wrap">
        ${group.items.map(x => {
          const a = x.a;
          const isImg = a.dataUrl && a.type && a.type.startsWith('image/');
          const hasData = !!a.dataUrl;
          const tk = x.taskId ? `'${x.taskId}'` : 'null';
          const openExpr = `openByRef('${x.caseId}',${tk},${x.idx})`;
          return `<div class="pattach-item">
            ${isImg
              ? `<img src="${a.dataUrl}" class="pattach-thumb" onclick="${openExpr}" alt="${escapeHtml(a.name)}">`
              : `<div class="pattach-placeholder" onclick="${hasData?openExpr:''}" style="${hasData?'cursor:pointer':''}"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>`}
            <div class="pattach-info">
              <div class="pattach-name">${escapeHtml(a.name)}</div>
              <div class="pattach-meta">
                <span>${a.addedDate?fmtDMY(a.addedDate):''}</span>
                ${a.addedDate===today?`<span class="pattach-new">Today</span>`:''}
                <span class="pattach-source">${escapeHtml(x.source)}</span>
                ${a.addedBy?`<span>${escapeHtml(a.addedBy)}</span>`:''}
              </div>
            </div>
            <div class="pattach-act">
              <button class="pattach-btn" onclick="${openExpr}" title="Open"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
              ${hasData?`<button class="pattach-btn" onclick="downloadByRef('${x.caseId}',${tk},${x.idx})" title="Save"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>`:''}
              ${hasData?`<button class="pattach-btn share" onclick="shareByRef('${x.caseId}',${tk},${x.idx})" title="Share"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg></button>`:''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });
  container.innerHTML = html;
}

/* ── Closed Cases Panel ── */
function renderClosedPanel(){
  const container = document.getElementById('closed-panel-content');
  const summary = document.getElementById('closed-panel-summary');
  const closed = cases.filter(c => c.closed).sort((a,b) => (b.closedDate||'').localeCompare(a.closedDate||''));
  summary.textContent = `${closed.length} closed case${closed.length===1?'':'s'}`;
  updateClosedBadge();
  if(!closed.length){
    container.innerHTML = `<div class="panel-empty"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 14l2 2 4-4"/></svg><p>No closed cases yet</p></div>`;
    return;
  }
  container.innerHTML = closed.map(c => `<div class="closed-case-row">
    <div class="closed-case-info">
      <div class="closed-case-title">${escapeHtml(c.title)}</div>
      <div class="closed-case-meta">
        <span>Judge: ${escapeHtml(c.judge||'—')}</span>
        <span>Hearing: ${c.date?fmtDMY(c.date):'—'}</span>
        <span>Closed: ${c.closedDate?fmtDMY(c.closedDate):'—'}</span>
      </div>
    </div>
    <button class="closed-reopen-btn" onclick="reopenCaseFromPanel('${c.id}')">Reopen</button>
  </div>`).join('');
}

/* ── Bootstrap ── */
render();
initFirebase();
</script>
</body>
</html>
